<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Balkanske Vijesti</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { background: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .auth-card {
      background: var(--ink-light);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%; max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .auth-logo .brand-bv { font-size: 32px; width: 52px; height: 52px; }
    .auth-logo .brand-text { font-size: 18px; color: var(--white); }
    .auth-title { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--white); margin-bottom: 6px; }
    .auth-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 28px; }
    .auth-divider { border-color: rgba(255,255,255,0.1); margin: 24px 0; }
    .auth-footer-link { color: rgba(255,255,255,0.5); font-size: 14px; text-align: center; margin-top: 20px; }
    .auth-footer-link a { color: var(--gold); font-weight: 600; text-decoration: none; }
    .auth-footer-link a:hover { color: var(--white); }
    .registered-banner { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.3); border-radius: 6px; padding: 12px 16px; color: #27ae60; font-size: 14px; margin-bottom: 20px; display: none; }
  </style>
</head>
<body>

<!-- minimal top nav -->
<nav style="background:rgba(0,0,0,0.3);padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.08)">
  <div class="container">
    <a href="../index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none">
      <span class="brand-bv" style="font-family:var(--font-display);font-size:22px;font-weight:900;color:var(--white);background:var(--accent);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:2px">BV</span>
      <span style="font-family:var(--font-display);color:var(--white);font-size:15px;font-weight:700">Balkanske Vijesti</span>
    </a>
  </div>
</nav>

<div class="auth-page-wrap">
  <div class="auth-card">
    <div id="registeredBanner" class="registered-banner">
      <i class="bi bi-check-circle me-2"></i> Account created successfully! Sign in below.
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your account to continue</p>

    <div id="loginError" class="alert alert-danger d-none" style="font-size:14px"></div>

    <div class="mb-3">
      <label class="form-label" style="color:rgba(255,255,255,.7);font-size:13px;font-weight:600">Email address</label>
      <input type="email" class="form-control auth-input" id="loginEmail" placeholder="you@email.com" autocomplete="email"/>
    </div>
    <div class="mb-4">
      <label class="form-label" style="color:rgba(255,255,255,.7);font-size:13px;font-weight:600">Password</label>
      <div style="position:relative">
        <input type="password" class="form-control auth-input" id="loginPassword" placeholder="••••••••" autocomplete="current-password" id="loginPassword"/>
        <button type="button" onclick="togglePwd('loginPassword',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;padding:0">
          <i class="bi bi-eye"></i>
        </button>
      </div>
    </div>

    <button id="loginSubmitBtn" class="btn btn-auth w-100" onclick="doLogin()">Sign In</button>

    <hr class="auth-divider"/>

    <p class="auth-footer-link">Don't have an account? <a href="register.html">Create one</a></p>
    <p class="auth-footer-link" style="margin-top:10px"><a href="../index.html" style="color:rgba(255,255,255,.4)"><i class="bi bi-arrow-left me-1"></i>Back to home</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // If already logged in, go home
    if (Auth.isLoggedIn()) { window.location.href = '../index.html'; return; }
    // Show banner if coming from register
    if (new URLSearchParams(location.search).get('registered')) {
      document.getElementById('registeredBanner').style.display = 'block';
    }
    // Allow Enter key
    document.getElementById('loginPassword').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });
  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '<i class="bi bi-eye-slash"></i>'; }
    else { inp.type = 'password'; btn.innerHTML = '<i class="bi bi-eye"></i>'; }
  }
</script>
</body>
</html>
