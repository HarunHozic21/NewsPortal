<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — Balkanske Vijesti</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { background: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .auth-card {
      background: var(--ink-light);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%; max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .auth-title { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--white); margin-bottom: 6px; }
    .auth-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 28px; }
    .auth-divider { border-color: rgba(255,255,255,0.1); margin: 24px 0; }
    .auth-footer-link { color: rgba(255,255,255,0.5); font-size: 14px; text-align: center; margin-top: 20px; }
    .auth-footer-link a { color: var(--gold); font-weight: 600; text-decoration: none; }
    .auth-footer-link a:hover { color: var(--white); }
    .benefit-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; color: rgba(255,255,255,.6); font-size: 14px; }
    .benefit-icon { color: var(--gold); flex-shrink: 0; margin-top: 2px; }
  </style>
</head>
<body>

<nav style="background:rgba(0,0,0,0.3);padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.08)">
  <div class="container">
    <a href="../index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none">
      <span style="font-family:var(--font-display);font-size:22px;font-weight:900;color:var(--white);background:var(--accent);width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:2px">BV</span>
      <span style="font-family:var(--font-display);color:var(--white);font-size:15px;font-weight:700">Balkanske Vijesti</span>
    </a>
  </div>
</nav>

<div class="auth-page-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Join thousands of readers following Balkan news</p>

    <!-- Benefits -->
    <div style="margin-bottom:24px;padding:16px;background:rgba(255,255,255,.04);border-radius:8px">
      <div class="benefit-row"><i class="bi bi-rss benefit-icon"></i> Personalised feed — choose your countries & topics</div>
      <div class="benefit-row"><i class="bi bi-bookmark benefit-icon"></i> Save articles to read later</div>
      <div class="benefit-row"><i class="bi bi-chat-square-text benefit-icon"></i> Comment and join the conversation</div>
    </div>

    <div id="registerError" class="alert alert-danger d-none" style="font-size:14px"></div>
    <div id="registerSuccess" class="alert alert-success d-none" style="font-size:14px"></div>

    <div class="row g-3">
      <div class="col-12">
        <label class="form-label" style="color:rgba(255,255,255,.7);font-size:13px;font-weight:600">Username</label>
        <input type="text" class="form-control auth-input" id="regUsername" placeholder="johndoe" autocomplete="username"/>
      </div>
      <div class="col-12">
        <label class="form-label" style="color:rgba(255,255,255,.7);font-size:13px;font-weight:600">Email address</label>
        <input type="email" class="form-control auth-input" id="regEmail" placeholder="you@email.com" autocomplete="email"/>
      </div>
      <div class="col-12">
        <label class="form-label" style="color:rgba(255,255,255,.7);font-size:13px;font-weight:600">Password</label>
        <div style="position:relative">
          <input type="password" class="form-control auth-input" id="regPassword" placeholder="Min. 8 characters" autocomplete="new-password"/>
          <button type="button" onclick="togglePwd('regPassword',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;padding:0">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <div class="col-12">
        <label class="form-label" style="color:rgba(255,255,255,.7);font-size:13px;font-weight:600">Country <span style="color:rgba(255,255,255,.3);font-weight:400">(optional)</span></label>
        <select class="form-select auth-input" id="regCountry">
          <option value="">Select your country</option>
          <option value="Bosnia">🇧🇦 Bosnia & Herzegovina</option>
          <option value="Serbia">🇷🇸 Serbia</option>
          <option value="Croatia">🇭🇷 Croatia</option>
          <option value="Slovenia">🇸🇮 Slovenia</option>
          <option value="Montenegro">🇲🇪 Montenegro</option>
          <option value="NorthMacedonia">🇲🇰 North Macedonia</option>
          <option value="Kosovo">🇽🇰 Kosovo</option>
        </select>
      </div>
    </div>

    <button id="registerSubmitBtn" class="btn btn-auth w-100 mt-4" onclick="doRegister()">Create Account</button>

    <hr class="auth-divider"/>
    <p class="auth-footer-link">Already have an account? <a href="login.html">Sign in</a></p>
    <p class="auth-footer-link" style="margin-top:10px"><a href="../index.html" style="color:rgba(255,255,255,.4)"><i class="bi bi-arrow-left me-1"></i>Back to home</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (Auth.isLoggedIn()) { window.location.href = '../index.html'; return; }
  });
  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '<i class="bi bi-eye-slash"></i>'; }
    else { inp.type = 'password'; btn.innerHTML = '<i class="bi bi-eye"></i>'; }
  }
</script>
</body>
</html>
